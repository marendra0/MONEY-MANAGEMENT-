<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          const originalFetch = window.fetch || globalThis.fetch;
          if (originalFetch) {
            // Redefine window.fetch to be writable and configurable
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
            // Redefine globalThis.fetch to be writable and configurable
            Object.defineProperty(globalThis, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (err) {
          console.warn("Unable to make fetch configurable:", err);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
